name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run frontend test
        run: node frontend/test/test.js

  backend-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URI: mongodb://localhost:27017/pc_config_db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend test
        working-directory: backend
        run: npm test

  selenium-test:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URI: mongodb://localhost:27017/pc_config_db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm install

      - name: Install Selenium WebDriver
        run: npm install selenium-webdriver

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install Chrome and matching ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Start backend, wait for readiness, and run Selenium
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          node backend/server.js > backend.log 2>&1 &
          BACKEND_PID=$!
          trap 'kill $BACKEND_PID' EXIT
          npx wait-on tcp:127.0.0.1:5000 --timeout 60000
          node selenium-test.js

      - name: Print backend log on failure
        if: failure()
        run: cat backend.log

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, selenium-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pc-config-app ./backend

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy step
        run: echo "Deploying to Render..."
