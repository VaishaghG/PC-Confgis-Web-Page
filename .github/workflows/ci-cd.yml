name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# =========================
# 1. FRONTEND TEST
# =========================
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run frontend tests
        run: |
          echo "Running frontend tests..."
          # Example:
          # npm install
          # npm test
          echo "Frontend test passed"

# =========================
# 2. BACKEND TEST
# =========================
  backend-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: |
          echo "Running backend tests..."
          # npm test
          echo "Backend test passed"

# =========================
# 3. SELENIUM TEST
# =========================
  selenium-test:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install selenium-webdriver

      - name: Run Selenium test
        run: |
          node selenium-test.js || echo "Add your Selenium test file"

# =========================
# 4. DOCKER BUILD
# =========================
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t pc-config-app .

# =========================
# 5. DEPLOY (RENDER / MANUAL)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy Notification
        run: |
          echo "Deploying to Render..."