<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — PC Configurator</title>
    <meta name="description" content="Your PC Configurator order has been placed successfully.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/success.css">
</head>
<body>

<main class="success-main">
    <div class="success-card">

        <!-- Animated Checkmark -->
        <div class="check-circle">
            <div class="check-bg"></div>
            <svg class="checkmark-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
                <path class="checkmark-check" d="M14 26l8 8 16-16"/>
            </svg>
        </div>

        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-subtitle">
            Thank you for your order! Your PC components are on their way.<br>
            You'll receive a confirmation shortly.
        </p>

        <!-- Order ID -->
        <div class="order-id-chip">
            <span class="order-id-label">Order ID</span>
            <span class="order-id-value" id="order-id-display">Generating…</span>
        </div>

        <!-- Actions -->
        <div class="success-actions">
            <a href="index.html" class="btn-home">
                <i class="bi bi-house-fill"></i>
                Back to Home
            </a>
            <a href="dashboard.html" class="btn-orders">
                <i class="bi bi-grid-fill"></i>
                View My Dashboard
            </a>
        </div>

    </div>
</main>

<script>
    // Generate a random order ID in the format PCO-XXXXXXXX
    function generateOrderId() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let id = 'PCO-';
        for (let i = 0; i < 8; i++) {
            id += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return id;
    }

    // Read orderId from URL params or generate one
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId') || generateOrderId();

    document.getElementById('order-id-display').textContent = orderId;

    // Ensure cart is cleared (belt-and-suspenders in case payment.js didn't run here)
    localStorage.removeItem('cart');
    localStorage.removeItem('paymentTotal');
    localStorage.removeItem('paymentItemCount');
    localStorage.removeItem('currentBuild');
</script>
</body>
</html>
