<!DOCTYPE html>
<html lang="en">
</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — PC Configurator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/cart.css">
    <link rel="stylesheet" href="/css/notifications.css">
    <link rel="stylesheet" href="/css/search.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid position-relative nav-layout">
        <div class="nav-left-col">
            <a class="navbar-brand glass-chip logo-chip" href="/">
                <img src="/images/logo.png" class="logo">
            </a>
        </div>
        <div class="nav-icons glass-chip nav-icons-chip d-flex align-items-center">
            <a class="nav-back-btn glass-chip me-2" href="#" onclick="history.back(); return false;" aria-label="Go back">
                <i class="bi bi-arrow-left"></i>
            </a>

            <span id="navUser" class="nav-user-text text-white fw-bold"></span>
            <input type="text" id="search-input" class="search-input" placeholder="Search components..." autocomplete="off">
            <div id="search-results" class="search-results-dropdown d-none"></div>

            <a href="#" id="btn-search-toggle" class="glass-chip icon-chip" aria-label="Search">
                <i class="bi bi-search nav-icon"></i>
            </a>
            <a href="#" id="nav-account-btn" class="glass-chip icon-chip" aria-label="Account"><i class="bi bi-person nav-icon"></i></a>
        </div>
    </div>
</nav>

<main class="cart-main">
    <div class="cart-container">
        
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <span id="cart-count">0 items</span>
        </div>

        <div class="cart-layout">
            
            <!-- LEFT: Item List -->
            <div class="cart-items glass-card" id="cart-list">
                
                <div id="cart-loading" class="text-center py-5 text-muted">
                    <div class="spinner-border text-light mb-3" role="status"></div>
                    <p>Loading your cart...</p>
                </div>

                <!-- JS Will inject cart items here -->
                
            </div>

            <!-- RIGHT: Order Summary -->
            <div class="cart-summary glass-card">
                <h4 class="summary-title">Order Summary</h4>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span class="text-success">Free</span>
                </div>
                
                <div class="summary-divider"></div>

                <div class="address-select-section mt-3">
                    <h5 class="mb-3">Delivery Address</h5>
                    <div id="address-options">
                        <div class="form-check address-radio mb-2">
                            <input class="form-check-input" type="radio" name="deliveryAddress" id="addr-home" value="home">
                            <label class="form-check-label" for="addr-home">
                                <strong>Home</strong><br>
                                <small id="display-home-address" class="text-muted">Loading...</small>
                            </label>
                        </div>
                        <div class="form-check address-radio d-none" id="office-option-container">
                            <input class="form-check-input" type="radio" name="deliveryAddress" id="addr-office" value="office">
                            <label class="form-check-label" for="addr-office">
                                <strong>Office</strong><br>
                                <small id="display-office-address" class="text-muted"></small>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="summary-divider"></div>
                
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="summary-total">$0.00</span>
                </div>

                <button id="main-checkout-btn" class="btn-primary w-100 py-3 mt-4 summary-checkout" disabled>
                    Proceed to Checkout <i class="bi bi-shield-lock ms-2"></i>
                </button>
                <a href="/" class="btn-continue w-100 text-center d-block mt-3">
                    Continue Shopping
                </a>
            </div>

        </div>

    </div>
</main>

<script src="/js/config.js"></script>
    <script>
        // Inline check for authentication before rendering
        (async function() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/me`, {credentials: 'include'});
                const data = await res.json();
                if (!data.loggedIn) {
                    window.location.replace(`/login.html?redirect=${encodeURIComponent(window.location.pathname)}&error=unauth`);
                }
            } catch (err) {
                console.error("Auth check failed", err);
            }
        })();
    </script>
<script src="/js/notifications.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/search.js"></script>
</body>
</html>
