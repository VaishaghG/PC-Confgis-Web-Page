<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — PC Configurator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid position-relative nav-layout">
        <a class="nav-back-btn glass-chip" href="#" onclick="history.back(); return false;" aria-label="Go back">
            <i class="bi bi-arrow-left"></i>
        </a>
        <a class="navbar-brand glass-chip logo-chip mx-auto" href="/">
            <img src="/images/logo.png" class="logo">
        </a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card glass-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join us to save custom builds and checkout.</p>
        
        <div id="auth-alert" class="alert alert-danger d-none"></div>

        <form id="signup-form">
            <div class="form-group">
                <label>Name</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Create password" required minlength="6" data-password-input>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Show password" aria-pressed="false">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" id="btn-signup" class="btn-auth btn-primary">
                Sign Up <i class="bi bi-person-plus ms-2"></i>
            </button>
        </form>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <a href="/api/auth/google" class="btn-auth btn-google">
            <i class="bi bi-google"></i> Sign up with Google
        </a>

        <p class="auth-footer">
            Already have an account? <a href="/login.html">Login</a>
        </p>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
