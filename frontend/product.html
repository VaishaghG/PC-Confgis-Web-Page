<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Details — PC Configurator</title>
    <link rel="icon" type="image/png" href="/images/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/product.css">
<link rel="stylesheet" href="/css/notifications.css">
<link rel="stylesheet" href="/css/search.css">
</head>

<body>

<!-- NAVBAR (same as index) -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container-fluid position-relative nav-layout product-page">

<div class="nav-left-col">
<a class="navbar-brand glass-chip logo-chip" href="/">
<img src="/images/logo.png" class="logo">
</a>
</div>

<ul class="navbar-nav nav-center glass-chip nav-center-chip product-nav-hide">
<li class="nav-item"><a class="nav-link" href="index.html#cpu-section">CPU</a></li>
<li class="nav-item"><a class="nav-link" href="index.html#gpu-section">GPU</a></li>
<li class="nav-item"><a class="nav-link" href="index.html#ram-section">RAM</a></li>
<li class="nav-item"><a class="nav-link" href="index.html#storage-section">STORAGE</a></li>
<li class="nav-item"><a class="nav-link" href="index.html#cabinet-section">CABINET</a></li>
</ul>

<div class="nav-icons glass-chip nav-icons-chip d-flex align-items-center">
    <a class="nav-back-btn glass-chip me-2" href="index.html" aria-label="Go back">
        <i class="bi bi-arrow-left"></i>
    </a>
    
    <span id="navUser" class="nav-user-text text-white fw-bold"></span>
    <input type="text" id="search-input" class="search-input" placeholder="Search components..." autocomplete="off">
    <div id="search-results" class="search-results-dropdown d-none"></div>

    <a href="#" id="btn-search-toggle" class="glass-chip icon-chip" aria-label="Search">
        <i class="bi bi-search nav-icon"></i>
    </a>
    <a href="#" id="nav-account-btn" class="glass-chip icon-chip" aria-label="Account">
        <i class="bi bi-person nav-icon"></i>
    </a>
    <a href="/cart.html" class="glass-chip icon-chip" aria-label="Cart">
        <i class="bi bi-cart nav-icon"></i>
    </a>
</div>

</div>
</nav>

<!-- MAIN CONTENT -->
<main class="product-main">

<!-- LOADING STATE -->
<div id="product-loading" class="product-loading">
<div class="spinner-border text-light" role="status"></div>
<p class="mt-3">Loading product...</p>
</div>

<!-- ERROR STATE -->
<div id="product-error" class="product-error d-none">
<i class="bi bi-exclamation-triangle-fill fs-1 text-warning mb-3"></i>
<h4>Product not found</h4>
<a href="index.html" class="btn btn-dark mt-3">← Back to Store</a>
</div>

<!-- PRODUCT LAYOUT -->
<div id="product-content" class="product-layout d-none">

<!-- LEFT: Image -->
<div class="product-image-panel glass-card">
<div class="product-image-wrap">
<img id="product-img" src="" alt="Product Image" class="product-img">
</div>
<div class="product-badge" id="product-type-badge"></div>
</div>

<!-- RIGHT: Info -->
<div class="product-info-panel">

<p class="product-breadcrumb">
<a href="#" onclick="history.back(); return false;">Store</a> <i class="bi bi-chevron-right"></i>
<span id="product-category">—</span> <i class="bi bi-chevron-right"></i>
<span id="product-name-breadcrumb">—</span>
</p>

<h1 id="product-name" class="product-title">—</h1>

<div class="product-rating-row" id="product-rating-row">
<div class="stars" id="product-stars"></div>
<span class="rating-text" id="product-rating-text"></span>
</div>

<div class="product-price-row">
<span class="product-price" id="product-price">—</span>
<span class="product-price-note">Free Delivery</span>
</div>

<div class="product-divider"></div>

<div class="product-specs glass-card">
<h5 class="specs-title"><i class="bi bi-list-ul me-2"></i>All Details</h5>
<table class="specs-table" id="specs-table">
<tbody id="specs-body"></tbody>
</table>
</div>

<div class="product-actions">
<button class="btn-action btn-cart" id="btn-cart">
<i class="bi bi-cart-plus me-2"></i>Add to Cart
</button>
<button class="btn-action btn-add-to-build" id="btn-add-to-build">
<i class="bi bi-plus-circle me-2"></i>Add to Build
</button>
</div>

</div>
</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/product.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/search.js"></script>
</body>
</html>
