<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PC Configurator</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid position-relative nav-layout">
        <a class="nav-back-btn glass-chip" href="#" onclick="history.back(); return false;" aria-label="Go back">
            <i class="bi bi-arrow-left"></i>
        </a>
        <a class="navbar-brand glass-chip logo-chip mx-auto" href="/">
            <img src="/images/logo.png" class="logo">
        </a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card glass-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to access your cart and saved builds.</p>
        
        <div id="auth-alert" class="alert alert-danger d-none"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required data-password-input>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Show password" aria-pressed="false">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="auth-inline-action">
                <button type="button" id="btn-forgot-password" class="btn-link-inline">Forgot password?</button>
            </div>
            
            <button type="submit" id="btn-login" class="btn-auth btn-primary">
                Login <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <form id="forgot-password-form" class="d-none">
            <div class="form-group">
                <label>Account Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="fp-email" class="form-control" placeholder="Enter your account email" required>
                </div>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="fp-password" class="form-control" placeholder="Enter new password" required minlength="6" data-password-input>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Show password" aria-pressed="false">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="fp-confirm" class="form-control" placeholder="Confirm new password" required minlength="6" data-password-input>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Show password" aria-pressed="false">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="btn-forgot-submit" class="btn-auth btn-primary">
                Reset Password
            </button>
            <button type="button" id="btn-cancel-forgot" class="btn-auth btn-google mt-2">
                Back to Login
            </button>
        </form>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <a href="/api/auth/google" class="btn-auth btn-google">
            <i class="bi bi-google"></i> Continue with Google
        </a>

        <p class="auth-footer">
            Don't have an account? <a href="/signup.html">Sign up</a>
        </p>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
