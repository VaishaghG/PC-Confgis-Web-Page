<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PC Configurator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid position-relative nav-layout">
        <a class="nav-back-btn glass-chip" href="#" onclick="history.back(); return false;" aria-label="Go back">
            <i class="bi bi-arrow-left"></i>
        </a>
        <a class="navbar-brand glass-chip logo-chip mx-auto" href="index.html">
            <img src="images/logo.png" class="logo">
        </a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card glass-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to access your cart and saved builds.</p>
        
        <div id="auth-alert" class="alert alert-danger d-none"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>
            
            <button type="submit" id="btn-login" class="btn-auth btn-primary">
                Login <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <a href="http://127.0.0.1:5000/api/auth/google" class="btn-auth btn-google">
            <i class="bi bi-google"></i> Continue with Google
        </a>

        <p class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
